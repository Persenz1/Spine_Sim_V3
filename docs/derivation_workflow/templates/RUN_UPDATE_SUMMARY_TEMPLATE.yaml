# 若无工程事实变化，将 engineering_context_delta 精确替换为：
# engineering_context_delta:
#   - id: "none"
#     operation: "none"
#     target: null
#     reason: "未发现需要修改的工程事实"
#     affected_modules: []
#     changed_fields: []
#     evidence:
#       local_literature: []
#       external_urls: []
#       gpt_knowledge: []
#       derivation_locations: []
#     proposed_fact: null
#     approval_required: false
#
# 若有变化，每个条目必须给出修改后的完整 proposed_fact；未使用的 proposed_fact
# 可选字段必须删除，不能保留 null、空字符串或空列表。value 必须使用真实的 YAML
# 单值、列表或映射形状，不能把数值和单位拼成一个字符串。

run:
  module: "{A1}"
  prompt_version: "{version}"
  engineering_context_baseline: "{version}"
  module_context_baseline: "none | {version}"
  run_directory: "derivation/runs/{A1}"

engineering_context_delta:
  - id: "{FACT.ID}"
    operation: "{add | modify}"
    target:
      fact_file: "engineering_fixed_context/internal/facts/{NN_domain}.yaml"
      domain_id: "{DOMAIN_ID}"
      domain_order: 0
      fact_order: 0
    reason: "{为什么建议变化}"
    affected_modules:
      - "{A1}"
    changed_fields:
      - "{summary}"
    evidence:
      local_literature:
        - "{文献编号；例如 01}"
      external_urls:
        - "{可直接访问的网址}"
      gpt_knowledge:
        - "{所用自身知识及适用边界}"
      derivation_locations:
        - "{MODULE_CONTEXT 章节或本轮推导位置}"
    proposed_fact:
      id: "{FACT.ID}"
      title: "{标题}"
      order: 0
      status: "{fixed | fixed_set | fixed_range | model_switch | interface_required | unresolved | excluded}"
      scopes:
        - "{global | single_spine | array_unit | cross_gripper | solver | experiment}"
      summary: "{完整工程事实摘要}"
      symbol: "{可选；不含外层 $；不用时删除本字段}"
      value: "{可选；不用时删除本字段；开关值必须写成带引号字符串}"
      unit: "{可选；不用时删除本字段}"
      definitions:
        - term: "{名称}"
          meaning: "{含义}"
      equations:
        - latex: "{LaTeX；不含 $$}"
          label: "{可选；不用时删除}"
          description: "{可选；不用时删除}"
      requirements:
        - "{工程要求}"
      constraints:
        - "{工程约束}"
      notes:
        - "{工程说明}"
      registry:
        - id: "{合法且全局唯一的登记 ID}"
          topic: "{未决主题}"
          scope: "{可选；不用时删除}"
          note: "{可选；不用时删除}"
      provenance:
        type: "{修改既有事实时原样保留；新增事实可用 run_candidate}"
        source: "{修改既有事实时原样保留；新增事实使用本地已归档文件路径}"
        section: "{修改既有事实时原样保留；新增事实填写本地来源章节}"
    approval_required: true

module_context_delta:
  added:
    - "{本轮新增的关键机理、接口或验证；无则写 none}"
  modified:
    - "{相对上一完整 MODULE_CONTEXT 的修改；A1 或无修改时写 none}"
  preserved:
    - "{必须原样继承的既有内容；A1 写 none}"
  unresolved:
    - "{本轮仍未解决的问题}"

outputs:
  module_context_complete: true
  engineering_context_candidate_complete: true
  engineering_context_candidate_renderer_compatible: true
  citation_brief_created: true
  citation_brief_local_archive_only: true

self_check:
  engineering_mechanism_separation: "pass | fail"
  no_silent_hardcoding: "pass | fail"
  schema_required_fields_complete: "pass | fail"
  ids_orders_unique: "pass | fail"
  statuses_scopes_allowed: "pass | fail"
  provenance_local_and_complete: "pass | fail"
  baseline_provenance_preserved_for_modified_facts: "pass | fail"
  no_unrendered_dependencies: "pass | fail"
  downstream_boundary_respected: "pass | fail"
  notes:
    - "{其他检查结果}"
